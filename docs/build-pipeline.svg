  <text x="832" y="298" text-anchor="middle" font-size="8" fill="#0050a0">app_location: dist/</text>
  <rect x="760" y="304" width="52" height="13" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
