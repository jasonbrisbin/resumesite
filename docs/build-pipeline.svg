  <text x="348" y="276" text-anchor="middle" font-size="9" fill="#24292f" font-weight="600">Secrets</text>
  <text x="282" y="292" font-size="7.5" fill="#57606a">AZURE_STATIC_WEB_APPS_API_TOKEN</text>
  <text x="282" y="303" font-size="7.5" fill="#57606a">GITHUB_TOKEN</text>

