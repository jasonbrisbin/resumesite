  <rect x="252" y="88" width="192" height="16" fill="#24292f"/>
  <text x="348" y="92" text-anchor="middle" font-size="9" fill="#ffffff" letter-spacing="3" font-weight="700">GITHUB</text>

  <!-- Octocat circle -->
  <circle cx="348" cy="148" r="28" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="348" y="155" text-anchor="middle" font-size="26">🐙</text>

  <text x="348" y="192" text-anchor="middle" font-size="9" fill="#24292f" font-weight="600">resumesite</text>
  <text x="348" y="205" text-anchor="middle" font-size="8" fill="#57606a">branch: master</text>

  <!-- on: push trigger -->
  <rect x="274" y="220" width="148" height="28" rx="4" fill="#dafbe1" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="348" y="233" text-anchor="middle" font-size="8" fill="#1a7f37" font-weight="700">on: push → master</text>
  <text x="348" y="243" text-anchor="middle" font-size="8" fill="#57606a">deploy.yml triggers</text>

