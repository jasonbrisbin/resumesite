       ZONE 2 — GITHUB
  ═══════════════════════════════════════════════════ -->
  <rect x="252" y="72" width="192" height="420" rx="8" fill="#ffffff" stroke="#24292f" stroke-width="1.5" filter="url(#cardshadow)"/>
