  <rect x="24" y="510" width="912" height="52" rx="6" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>

  <rect x="44" y="524" width="10" height="10" rx="2" fill="#e2bf2b"/>
  <text x="60" y="533" font-size="9" fill="#444444">Resume data (YAML)</text>

  <rect x="180" y="524" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="196" y="533" font-size="9" fill="#444444">Jinja2 template</text>

