<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580" font-family="Inter, system-ui, sans-serif">

  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f5f7"/>
      <stop offset="100%" stop-color="#eceef2"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2bf2b"/>
      <stop offset="100%" stop-color="#c9a41e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c2ec0"/>
      <stop offset="100%" stop-color="#4a1e9e"/>
    </linearGradient>

    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c9a41e"/>
    </marker>

    <filter id="cardshadow" x="-4%" y="-4%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000014"/>
    </filter>
    <filter id="titleshadow" x="-4%" y="-4%" width="115%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="960" height="580" fill="url(#pageBg)"/>

  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#000000" stroke-width="1">
    <line x1="0" y1="72" x2="960" y2="72"/>
    <line x1="0" y1="144" x2="960" y2="144"/>
    <line x1="0" y1="216" x2="960" y2="216"/>
    <line x1="0" y1="288" x2="960" y2="288"/>
    <line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="432" x2="960" y2="432"/>
    <line x1="0" y1="504" x2="960" y2="504"/>
    <line x1="120" y1="0" x2="120" y2="580"/>
    <line x1="240" y1="0" x2="240" y2="580"/>
    <line x1="360" y1="0" x2="360" y2="580"/>
    <line x1="480" y1="0" x2="480" y2="580"/>
    <line x1="600" y1="0" x2="600" y2="580"/>
    <line x1="720" y1="0" x2="720" y2="580"/>
    <line x1="840" y1="0" x2="840" y2="580"/>
  </g>

  <!-- ═══════════════ TITLE ═══════════════ -->
  <text x="480" y="36" text-anchor="middle" font-family="Oswald, sans-serif" font-size="20" font-weight="600" fill="#4a1e9e" letter-spacing="4">BUILD &amp; DEPLOY PIPELINE</text>
  <text x="480" y="54" text-anchor="middle" font-size="11" fill="#888888" letter-spacing="1">resumesite · jasonbrisbin.com</text>

  <!-- Pipeline track line -->
  <line x1="48" y1="290" x2="912" y2="290" stroke="#e2bf2b" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.35"/>


  <!-- ═══════════════════════════════════════════════════
       ZONE 1 — LOCAL
  ═══════════════════════════════════════════════════ -->
  <rect x="24" y="72" width="178" height="420" rx="8" fill="#ffffff" stroke="#e2bf2b" stroke-width="1.5" filter="url(#cardshadow)"/>
  <!-- Zone header -->
  <rect x="24" y="72" width="178" height="32" rx="8" fill="#e2bf2b"/>
  <rect x="24" y="88" width="178" height="16" fill="#e2bf2b"/>
  <text x="113" y="92" text-anchor="middle" font-size="9" fill="#ffffff" letter-spacing="3" font-weight="700">LOCAL</text>

  <!-- content.yaml -->
  <rect x="42" y="118" width="142" height="70" rx="5" fill="#fffbeb" stroke="#e2bf2b" stroke-width="1.5" filter="url(#titleshadow)"/>
  <rect x="42" y="118" width="142" height="20" rx="5" fill="#e2bf2b" opacity="0.2"/>
  <rect x="42" y="130" width="142" height="8" fill="#e2bf2b" opacity="0.2"/>
  <text x="113" y="132" text-anchor="middle" font-size="9" fill="#92700a" font-weight="700">content.yaml</text>
  <text x="57" y="150" font-size="8" fill="#666666">BasicInfo</text>
  <text x="57" y="162" font-size="8" fill="#666666">Profile · Experience</text>
  <text x="57" y="174" font-size="8" fill="#666666">Skills · Certs · Education</text>

  <!-- template.html -->
  <rect x="42" y="202" width="142" height="56" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1" filter="url(#titleshadow)"/>
  <rect x="42" y="202" width="142" height="18" rx="5" fill="#2563eb" opacity="0.12"/>
  <rect x="42" y="212" width="142" height="8" fill="#2563eb" opacity="0.12"/>
  <text x="113" y="215" text-anchor="middle" font-size="9" fill="#1d4ed8" font-weight="700">template.html</text>
  <text x="57" y="232" font-size="8" fill="#666666">Jinja2 template</text>
  <text x="57" y="244" font-size="8" fill="#888888">&#123;&#123; variables &#125;&#125;</text>

  <!-- style.css -->
  <rect x="42" y="270" width="142" height="44" rx="5" fill="#faf5ff" stroke="#4a1e9e" stroke-width="1" filter="url(#titleshadow)"/>
  <rect x="42" y="270" width="142" height="16" rx="5" fill="#4a1e9e" opacity="0.1"/>
  <rect x="42" y="278" width="142" height="8" fill="#4a1e9e" opacity="0.1"/>
  <text x="113" y="282" text-anchor="middle" font-size="9" fill="#4a1e9e" font-weight="700">style.css</text>
  <text x="57" y="300" font-size="8" fill="#666666">purple · gold · Inter · Oswald</text>

  <!-- build.py -->
  <rect x="42" y="326" width="142" height="44" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" filter="url(#titleshadow)"/>
  <rect x="42" y="326" width="142" height="16" rx="5" fill="#16a34a" opacity="0.1"/>
  <rect x="42" y="334" width="142" height="8" fill="#16a34a" opacity="0.1"/>
  <text x="113" y="338" text-anchor="middle" font-size="9" fill="#15803d" font-weight="700">build.py</text>
  <text x="57" y="356" font-size="8" fill="#666666">yaml → Jinja2 → dist/</text>

  <!-- requirements.txt -->
  <rect x="42" y="382" width="142" height="36" rx="5" fill="#f8f9fa" stroke="#cccccc" stroke-width="1"/>
  <text x="113" y="399" text-anchor="middle" font-size="9" fill="#555555" font-weight="600">requirements.txt</text>
  <text x="113" y="411" text-anchor="middle" font-size="8" fill="#888888">PyYAML · Jinja2</text>

  <!-- git push -->
  <rect x="60" y="432" width="106" height="26" rx="13" fill="url(#goldGrad)"/>
  <text x="113" y="449" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="700" letter-spacing="1">git push master</text>


  <!-- ═══════════════════════════════════════════════════
       ARROW 1
  ═══════════════════════════════════════════════════ -->
  <line x1="204" y1="290" x2="248" y2="290" stroke="#c9a41e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="226" y="283" text-anchor="middle" font-size="8" fill="#c9a41e" font-weight="600">push</text>


