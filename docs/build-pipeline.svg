  <text x="348" y="336" text-anchor="middle" font-size="8" fill="#0969da" font-weight="700">GitHub Actions</text>
  <text x="348" y="348" text-anchor="middle" font-size="8" fill="#57606a">ubuntu-latest runner</text>
  <line x1="274" y1="353" x2="422" y2="353" stroke="#d0d7de" stroke-width="1"/>

  <rect x="284" y="358" width="128" height="14" rx="3" fill="#ddf4ff"/>
  <text x="348" y="368" text-anchor="middle" font-size="8" fill="#0969da">① actions/checkout@v4</text>

  <rect x="284" y="376" width="128" height="14" rx="3" fill="#ddf4ff"/>
  <text x="348" y="386" text-anchor="middle" font-size="8" fill="#0969da">② setup-python@v5 · 3.12</text>

  <rect x="284" y="394" width="128" height="14" rx="3" fill="#ddf4ff"/>
  <text x="348" y="404" text-anchor="middle" font-size="8" fill="#0969da">③ pip install -r requirements</text>

  <text x="348" y="440" text-anchor="middle" font-size="8" fill="#888888">workflow: deploy.yml</text>


