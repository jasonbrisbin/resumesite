  ═══════════════════════════════════════════════════ -->
  <rect x="492" y="72" width="192" height="420" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="1.5" filter="url(#cardshadow)"/>
  <rect x="492" y="72" width="192" height="32" rx="8" fill="#16a34a"/>
  <rect x="492" y="88" width="192" height="16" fill="#16a34a"/>
  <text x="588" y="92" text-anchor="middle" font-size="9" fill="#ffffff" letter-spacing="3" font-weight="700">BUILD</text>

  <!-- Python circle -->
  <circle cx="588" cy="140" r="28" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="588" y="148" text-anchor="middle" font-size="26">🐍</text>

  <!-- python build.py -->
  <rect x="512" y="178" width="152" height="20" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="588" y="192" text-anchor="middle" font-size="9" fill="#15803d" font-family="monospace" font-weight="600">python build.py</text>

  <!-- Inputs -->
  <text x="514" y="222" font-size="8" fill="#888888" font-weight="600">Input</text>
  <rect x="514" y="226" width="62" height="14" rx="3" fill="#fffbeb" stroke="#e2bf2b" stroke-width="1"/>
  <text x="545" y="236" text-anchor="middle" font-size="7.5" fill="#92700a">content.yaml</text>
  <rect x="514" y="244" width="62" height="14" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="545" y="254" text-anchor="middle" font-size="7.5" fill="#1d4ed8">template.html</text>
  <rect x="514" y="262" width="62" height="14" rx="3" fill="#faf5ff" stroke="#4a1e9e" stroke-width="1"/>
  <text x="545" y="272" text-anchor="middle" font-size="7.5" fill="#4a1e9e">style.css</text>
  <rect x="514" y="280" width="62" height="14" rx="3" fill="#faf5ff" stroke="#4a1e9e" stroke-width="1"/>
  <text x="545" y="290" text-anchor="middle" font-size="7.5" fill="#4a1e9e">img/</text>

  <!-- Jinja2 engine -->
  <rect x="588" y="230" width="88" height="64" rx="5" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="632" y="249" text-anchor="middle" font-size="8" fill="#15803d" font-weight="700">Jinja2</text>
  <text x="632" y="262" text-anchor="middle" font-size="7.5" fill="#555555">yaml.safe_load()</text>
  <text x="632" y="274" text-anchor="middle" font-size="7.5" fill="#555555">env.get_template()</text>
  <text x="632" y="286" text-anchor="middle" font-size="7.5" fill="#555555">template.render(**data)</text>

  <!-- Arrow inputs → jinja2 -->
  <line x1="577" y1="260" x2="587" y2="260" stroke="#16a34a" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Output -->
  <text x="514" y="318" font-size="8" fill="#888888" font-weight="600">Output  dist/</text>
  <rect x="514" y="322" width="62" height="14" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="545" y="332" text-anchor="middle" font-size="7.5" fill="#15803d" font-weight="600">index.html</text>
  <rect x="514" y="340" width="62" height="14" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="545" y="350" text-anchor="middle" font-size="7.5" fill="#15803d">style.css</text>
  <rect x="514" y="358" width="62" height="14" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="545" y="368" text-anchor="middle" font-size="7.5" fill="#15803d">img/</text>

  <text x="588" y="328" font-size="7.5" fill="#888888">shutil.copy()</text>
  <text x="588" y="340" font-size="7.5" fill="#888888">shutil.copytree()</text>

  <text x="588" y="440" text-anchor="middle" font-size="8" fill="#888888">skip_app_build: true</text>


  <!-- ═══════════════════════════════════════════════════
       ARROW 3
  ═══════════════════════════════════════════════════ -->
  <line x1="686" y1="290" x2="724" y2="290" stroke="#c9a41e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="705" y="283" text-anchor="middle" font-size="8" fill="#c9a41e" font-weight="600">upload</text>


  <!-- ═══════════════════════════════════════════════════
       ZONE 4 — AZURE
  ═══════════════════════════════════════════════════ -->
  <rect x="728" y="72" width="208" height="420" rx="8" fill="#ffffff" stroke="#0078d4" stroke-width="1.5" filter="url(#cardshadow)"/>
  <rect x="728" y="72" width="208" height="32" rx="8" fill="#0078d4"/>
  <rect x="728" y="88" width="208" height="16" fill="#0078d4"/>
