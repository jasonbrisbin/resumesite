  <rect x="818" y="304" width="46" height="13" rx="2" fill="#faf5ff" stroke="#4a1e9e" stroke-width="1"/>
  <text x="841" y="313" text-anchor="middle" font-size="7.5" fill="#4a1e9e">style.css</text>
